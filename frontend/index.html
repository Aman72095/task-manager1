<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .login {
      background: #28a745;
    }

    .signup {
      background: #17a2b8;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 13px;
      color: gray;
      margin-bottom: 15px;
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="title">🚀 Task Manager</div>
    <div class="subtitle">Login to continue</div>

    <input id="email" placeholder="Enter Email" />
    <input id="password" type="password" placeholder="Enter Password" />

    <button class="btn login" onclick="login()">Login</button>

  </div>

<script>

const API = "https://task-manager1-production.up.railway.app";

// LOGIN FUNCTION
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!email || !password){
    return alert("Fill all fields");
  }

  const res = await fetch(API + "/api/auth/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      email,
      password
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", "Bearer " + data.token);
    window.location.href = "task.html";
  } else {
    alert(data.msg || "Login failed");
  }
}

</script>

</body>
</html>
