<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      width: 420px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 { text-align: center; }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .btn {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .create { background: #28a745; }
    .load { background: #17a2b8; }
    .logout { background: #dc3545; }

    li {
      background: #f1f1f1;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .overdue {
      color: red;
      font-weight: bold;
    }

    #stats {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>🚀 Task Dashboard</h2>

  <input id="title" placeholder="Task title" />
  <input id="assignedTo" placeholder="Assign user email" />
  <input id="deadline" type="date" />

  <button class="btn create" onclick="createTask()">Create Task</button>
  <button class="btn load" onclick="loadTasks()">Load Tasks</button>
  <button class="btn logout" onclick="logout()">Logout</button>

  <p id="stats"></p>
  <ul id="taskList"></ul>

</div>

<script>

const API = "https://task-manager1-production.up.railway.app";
const token = localStorage.getItem("token");

if (!token) {
  alert("Login first");
  window.location.href = "index.html";
}

// ✅ CREATE TASK
async function createTask() {
  const title = document.getElementById("title").value;
  const assignedTo = document.getElementById("assignedTo").value;
  const deadline = document.getElementById("deadline").value;

  if (!title) return alert("Enter task");

  await fetch(`${API}/api/tasks`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      title,
      assignedTo,
      deadline
    })
  });

  alert("Task Created");
  loadTasks();
}

// ✅ LOAD TASKS + DASHBOARD
async function loadTasks() {
  const res = await fetch(`${API}/api/tasks`, {
    headers: { "Authorization": token }
  });

  const tasks = await res.json();

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  let pending = 0;
  let completed = 0;
  let overdue = 0;

  const today = new Date();

  tasks.forEach(t => {

    const isCompleted = t.status === "Completed";
    const isOverdue = t.deadline && new Date(t.deadline) < today && !isCompleted;

    if (isCompleted) completed++;
    else pending++;

    if (isOverdue) overdue++;

    const li = document.createElement("li");

    li.innerHTML = `
      <div class="${isCompleted ? 'completed' : ''}">
        <b>${t.title}</b><br>
        👤 Assigned: ${t.assignedTo || "N/A"}<br>
        📅 Deadline: ${t.deadline ? t.deadline.split("T")[0] : "N/A"}<br>
        📌 Status: ${t.status}
        ${isOverdue ? "<div class='overdue'>⚠ Overdue</div>" : ""}
      </div>

      ${
        !isCompleted
        ? `<button onclick="markDone('${t._id}')">✔ Mark Done</button>`
        : ""
      }
    `;

    list.appendChild(li);
  });

  document.getElementById("stats").innerText =
    `📊 Pending: ${pending} | Completed: ${completed} | Overdue: ${overdue}`;
}

// ✅ MARK COMPLETE
async function markDone(id) {
  await fetch(`${API}/api/tasks/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      status: "Completed"
    })
  });

  loadTasks();
}

// ✅ LOGOUT
function logout() {
  localStorage.removeItem("token");
  window.location.href = "index.html";
}

loadTasks();

</script>

</body>
</html>
